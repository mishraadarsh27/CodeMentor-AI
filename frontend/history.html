<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | CodeMentor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-[#0B0F19] text-white h-screen overflow-hidden flex flex-col selection:bg-blue-500/30">

    <!-- Top Navigation -->
    <nav class="glass-nav flex justify-between items-center px-4 py-2 shrink-0 h-14">
        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white text-sm shadow-[0_0_10px_rgba(59,130,246,0.4)]">
                    <i class="fa-solid fa-code"></i>
                </div>
                <span class="font-bold font-heading hidden sm:block">CodeMentor</span>
            </a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/dashboard" class="text-sm text-gray-400 hover:text-white transition-colors mr-4">Back to Editor</a>
            <a href="/login" class="w-8 h-8 flex items-center justify-center rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 text-white shadow-lg">
                <i class="fa-solid fa-user text-xs"></i>
            </a>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Sidebar Navigation -->
        <aside class="w-14 sm:w-16 flex flex-col items-center py-4 border-r border-white/10 bg-[#0B0F19]/50 shrink-0 z-20">
            <div class="flex flex-col gap-4">
                <a href="/dashboard" class="w-10 h-10 rounded-xl text-gray-500 hover:text-white hover:bg-white/10 flex items-center justify-center text-lg transition-all" title="Workspace">
                    <i class="fa-solid fa-file-code"></i>
                </a>
                <a href="/history" class="w-10 h-10 rounded-xl bg-purple-500/20 text-purple-400 flex items-center justify-center text-lg border border-purple-500/30 shadow-[0_0_15px_rgba(168,85,247,0.2)]" title="History">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </a>
                <button class="w-10 h-10 rounded-xl text-gray-500 hover:text-white hover:bg-white/10 flex items-center justify-center text-lg transition-all" title="Learning Path">
                    <i class="fa-solid fa-road"></i>
                </button>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-8 relative">
            <div class="bg-blob blob-3 hidden md:block"></div>
            
            <div class="max-w-5xl mx-auto relative z-10">
                <div class="flex justify-between items-end mb-8 fade-in">
                    <div>
                        <h2 class="text-3xl font-bold font-heading mb-2">Analysis History</h2>
                        <p class="text-gray-400">Review your past code submissions and AI feedback.</p>
                    </div>
                    <div class="flex gap-2">
                        <select class="bg-[#111827] border border-white/10 rounded-lg px-4 py-2 text-sm text-gray-300 focus:outline-none focus:border-blue-500">
                            <option>All Time</option>
                            <option>Last 7 Days</option>
                        </select>
                    </div>
                </div>

                <!-- History List -->
                <div id="historyContainer" class="space-y-4">
                    <!-- Loaded dynamically via JS -->
                    <div class="flex items-center justify-center py-20 text-gray-500">
                        <i class="fa-solid fa-circle-notch animate-spin text-3xl mb-4"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('historyContainer');
            try {
                const history = await api.request('/history');
                
                container.innerHTML = '';
                
                if(history.length === 0) {
                    container.innerHTML = `
                        <div class="glass-panel p-10 rounded-2xl text-center border border-white/5">
                            <div class="w-16 h-16 mx-auto bg-white/5 rounded-full flex items-center justify-center text-gray-500 text-2xl mb-4">
                                <i class="fa-solid fa-ghost"></i>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-2">No history found</h3>
                            <p class="text-gray-400 text-sm">Analyze some code in the dashboard to see it here.</p>
                        </div>
                    `;
                    return;
                }

                history.forEach((item, index) => {
                    const date = new Date(item.created_at).toLocaleString();
                    let scoreColor = "text-red-400";
                    if(item.score >= 80) scoreColor = "text-green-400";
                    else if(item.score >= 60) scoreColor = "text-yellow-400";

                    container.innerHTML += `
                        <div class="glow-card p-6 fade-in" style="animation-delay: ${index * 50}ms">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center ${item.language === 'python' ? 'text-blue-400' : 'text-yellow-400'} text-xl border border-white/10">
                                        <i class="fa-brands fa-${item.language}"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-white">Analysis #${item.id}</h4>
                                        <p class="text-xs text-gray-500">${date}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 bg-[#0B0F19] px-3 py-1.5 rounded-lg border border-white/5">
                                    <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Score</span>
                                    <span class="font-bold ${scoreColor}">${item.score}/100</span>
                                </div>
                            </div>
                            
                            <div class="bg-[#0B0F19] rounded-xl p-4 border border-white/5 mb-4 overflow-hidden max-h-32 relative">
                                <pre class="text-xs font-mono text-gray-300"><code>${item.code_content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
                                <div class="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-[#0B0F19] to-transparent"></div>
                            </div>

                            <div class="flex justify-end gap-3">
                                <button onclick="window.location.href='/dashboard'" class="px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm font-medium transition-colors">
                                    Open in Editor
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<div class="p-4 bg-red-500/20 text-red-400 rounded-lg border border-red-500/30">Failed to load history.</div>';
            }
        });
    </script>
</body>
</html>
