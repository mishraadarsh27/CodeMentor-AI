<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CodeMentor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: white; }
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, #0a0a1a 0, #050505 50%),
                        radial-gradient(at 100% 100%, #1a0a0a 0, #050505 50%);
        }
        .glass-card {
            background: #0f0f0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
        }
        .neon-button {
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }
        .neon-button:hover {
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.6);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden mesh-gradient">
    
    <!-- Background Elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-[420px] p-8 glass-card rounded-[32px] relative z-10 mx-4">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/30 mx-auto mb-6 transform -rotate-6">
                <i class="fas fa-brain text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Welcome Back</h1>
            <p class="text-gray-400 text-sm">Step into the future of coding.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="text-[11px] font-bold text-gray-300 uppercase tracking-widest block mb-2 px-1">Username</label>
                <div class="relative group">
                    <i class="far fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" id="username" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition-all" placeholder="Enter username">
                </div>
            </div>

            <div>
                <label class="text-[11px] font-bold text-gray-300 uppercase tracking-widest block mb-2 px-1">Password</label>
                <div class="relative group">
                    <i class="far fa-eye absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors cursor-pointer"></i>
                    <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:outline-none focus:border-blue-500/50 focus:bg-white/10 transition-all" placeholder="••••••••">
                </div>
                <div class="flex justify-end mt-2">
                    <a href="#" class="text-[11px] text-blue-400 hover:text-blue-300 transition-colors font-semibold">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="w-full py-4 neon-button text-white font-bold rounded-2xl flex items-center justify-center gap-2 mt-4">
                <span>Login to Workspace</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="mt-10">
            <div class="relative flex items-center justify-center mb-8">
                <div class="w-full h-px bg-white/5"></div>
                <span class="absolute bg-[#080808] px-4 text-[10px] text-gray-600 font-bold uppercase tracking-widest">Or connect with</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl py-3 text-sm text-white transition-all">
                    <i class="fab fa-github text-xl"></i>
                    <span>GitHub</span>
                </button>
                <button class="flex items-center justify-center gap-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl py-3 text-sm text-white transition-all">
                    <i class="fab fa-google text-xl text-red-500"></i>
                    <span>Google</span>
                </button>
            </div>
        </div>

        <p class="text-center text-gray-500 text-xs mt-10">
            Don't have an account? 
            <a href="/signup" class="text-blue-500 font-bold hover:text-blue-400 transition-colors underline underline-offset-4">Join the future</a>
        </p>
    </div>

    <script src="/js/api.js?v=2"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            console.log("Login submitted");
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await api.login(u, p);
                console.log("Login response:", res);
                if (res.access_token) {
                    window.location.href = '/ide';
                } else {
                    alert(res.detail || "Login failed");
                }
            } catch (err) {
                console.error("Login error:", err);
                alert("An error occurred during login: " + err.message);
            }
        };
    </script>
</body>
</html>
