<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | CodeMentor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-[#0B0F19] text-white min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <a href="/" class="absolute top-6 left-6 flex items-center gap-2 text-gray-400 hover:text-white transition-colors z-20">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="w-full max-w-md p-8 glass-panel rounded-2xl z-10 fade-in border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <div class="text-center mb-8">
            <div class="w-12 h-12 mx-auto rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-2xl shadow-[0_0_15px_rgba(59,130,246,0.5)] mb-4">
                <i class="fa-solid fa-code"></i>
            </div>
            <h2 class="text-3xl font-bold font-heading mb-2">Welcome Back</h2>
            <p class="text-gray-400 text-sm">Sign in to continue your learning journey.</p>
        </div>

        <form class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" class="w-full bg-[#0B0F19]/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="developer@example.com">
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs text-blue-400 hover:text-blue-300">Forgot?</a>
                </div>
                <input type="password" class="w-full bg-[#0B0F19]/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="••••••••">
            </div>
            
            <button type="button" onclick="window.location.href='/dashboard'" class="btn-glow w-full py-3 rounded-xl font-bold mt-6 shadow-lg">
                Log In
            </button>
        </form>

        <div class="mt-6 flex items-center justify-center gap-4 before:h-px before:flex-1 before:bg-white/10 after:h-px after:flex-1 after:bg-white/10 text-gray-500 text-xs uppercase tracking-wider">
            Or continue with
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
            <button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 py-2.5 rounded-xl transition-colors text-sm font-medium">
                <i class="fa-brands fa-github text-lg"></i> GitHub
            </button>
            <button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 py-2.5 rounded-xl transition-colors text-sm font-medium">
                <i class="fa-brands fa-google text-lg"></i> Google
            </button>
        </div>

        <p class="text-center text-sm text-gray-400 mt-8">
            Don't have an account? <a href="/signup" class="text-blue-400 hover:text-blue-300 font-medium">Sign up</a>
        </p>
    </div>
</body>
</html>
